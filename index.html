<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Config Demo</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
      .card { max-width: 720px; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d1d5db; }
      button { margin-top: 12px; padding: 10px 14px; border-radius: 8px; border: 1px solid #111827; background: #111827; color: white; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      pre { background: #0b1020; color: #e5e7eb; padding: 12px; border-radius: 10px; overflow: auto; }
      .muted { color: #6b7280; }
      .error { color: #b91c1c; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Vercel Edge Config (HTML + JS)</h1>
      <p class="muted">
        This page fetches values from <code>/api/config</code>, which reads from your Edge Config store.
      </p>

      <label for="keys">Keys (comma-separated)</label>
      <input id="keys" placeholder="publicMessage, featureFlag" value="publicMessage" />
      <button id="load">Load from Edge Config</button>

      <p id="status" class="muted"></p>
      <p id="error" class="error" hidden></p>
      <pre id="output">Click "Load" to fetch config…</pre>
    </div>

    <script src="./main.js" defer></script>
  </body>
</html>
