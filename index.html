<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Location</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid #e5e7eb;
        background: #fff;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .controls-3 {
        grid-template-columns: 1fr auto auto;
      }

      label {
        font-size: 12px;
        color: #374151;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        outline: none;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      button {
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        background: #111827;
        color: #fff;
        border-radius: 10px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        font-size: 12px;
        color: #6b7280;
        word-break: break-word;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      @media (max-width: 720px) {
        .controls {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="topbar">
        <div>
          <label for="userId">Your ID (this device will save its location under this ID)</label>
        </div>
        <div class="row">
          <div class="controls controls-3">
            <input id="userId" type="text" placeholder="e.g. user123" autocomplete="off" />
            <button id="btnLocate" type="button">Get My Location</button>
            <button id="btnStop" type="button" disabled>Stop Sharing</button>
          </div>
          <div>
            <label for="searchId">Search an ID (show saved location)</label>
          </div>
          <div class="controls controls-3">
            <input id="searchId" type="text" placeholder="e.g. friend123" autocomplete="off" />
            <button id="btnSearch" type="button">Search</button>
            <button id="btnStopView" type="button" disabled>Stop Viewing</button>
          </div>
          <div class="status" id="status">Ready.</div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
